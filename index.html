<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Большая языковая модель</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="noise"></div>

    <!-- ÉCRAN DE CONNEXION (Plein écran) -->
    <div id="login-screen" class="full-page">
        <div class="login-card">
            <div class="giant-title">
                <span class="filled">ACCÈS</span>
                <span>RESTREINT</span>
            </div>
            <div class="form-group" style="margin-top: 2rem;">
                <label>IDENTIFICATION REQUISE</label>
                <input type="password" id="password-input" placeholder="MOT DE PASSE">
            </div>
            <button class="btn" id="login-btn">ENTRER dans le système →</button>
            <p id="login-error" class="error-msg">ACCÈS REFUSÉ : MOT DE PASSE INCORRECT</p>
        </div>
    </div>

    <!-- INTERFACE CHAT (Style Moderne / Full Screen) -->
    <div id="chat-screen" class="app-layout" style="display: none;">
        <!-- Barre latérale -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="giant-title mini">
                    <span class="filled">БОЛЬШАЯ</span>
                    <span>МОДЕЛЬ</span>
                </div>
            </div>
            <div class="sidebar-content">
                <div class="status-block">
                    <label>SYSTÈME</label>
                    <div id="status-display">STATUT: <span class="accent-text">EN LIGNE</span></div>
                    <div class="mini-text">SRV: OPENROUTER.AI</div>
                </div>
            </div>
            <div class="sidebar-footer">
                <button class="btn btn-outline" id="logout-btn">DÉCONNEXION</button>
            </div>
        </aside>

        <!-- Zone de Chat Principale -->
        <main class="chat-main">
            <div id="chat-box" class="messages-container">
                <!-- Les messages s'affichent ici -->
                <div class="log-entry system">SYSTÈME INITIALISÉ. BIENVENUE.</div>
            </div>

            <div class="input-wrapper">
                <div class="input-container">
                    <div class="form-group no-margin">
                        <textarea id="message-input" placeholder="Posez une question."></textarea>
                    </div>
                    <button class="send-circle" id="send-btn">↵</button>
                </div>
                <div class="footer-credits">YAZIKOVAYA.NETLIFY.APP</div>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
